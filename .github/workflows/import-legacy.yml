name: Import legacy branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add old repository and push master to legacy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add oldrepo https://github.com/tbunitrade/aws-paradasibix-app.git
          git fetch oldrepo master

          git checkout -B legacy oldrepo/master

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/tbunitrade/aws-paradisebox-clean.git legacy --force

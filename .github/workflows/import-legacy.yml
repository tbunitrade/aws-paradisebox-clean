name: Import legacy branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import old repo master as clean legacy snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add oldrepo https://github.com/tbunitrade/aws-paradasibix-app.git
          git fetch --depth=1 oldrepo master

          git checkout --orphan legacy-import

          git rm -rf . || true

          git checkout oldrepo/master -- .

          rm -rf .github/workflows/import-legacy.yml

          git add .
          git commit -m "Import legacy snapshot from old repository"

          git branch -M legacy

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/tbunitrade/aws-paradisebox-clean.git legacy --force
